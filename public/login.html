<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff sign in — LANDBANK Tanauan</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-100 flex flex-col items-center justify-center px-4">
    <div class="w-full max-w-sm rounded-2xl border border-slate-200 bg-white p-8 shadow-lg shadow-emerald-900/5">
      <div class="flex justify-center mb-6">
        <img src="/assets/landbank-logo.png" alt="" class="h-14 w-auto" width="120" height="56" />
      </div>
      <h1 class="text-center text-lg font-semibold text-slate-900">LANDBANK Tanauan Branch</h1>
      <p class="mt-1 text-center text-xs text-slate-500">Staff access only. Enter the site password.</p>

      <form id="login-form" class="mt-6 space-y-4">
        <div>
          <label for="password" class="block text-xs font-medium text-slate-600">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
            class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm focus:border-emerald-600 focus:outline-none focus:ring-1 focus:ring-emerald-600"
          />
        </div>
        <button
          type="submit"
          class="w-full rounded-lg bg-emerald-700 py-2.5 text-sm font-semibold text-white hover:bg-emerald-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2"
        >
          Sign in
        </button>
      </form>
      <p id="login-error" class="mt-3 text-center text-sm text-red-600 hidden" role="alert"></p>
    </div>
    <p class="mt-8 text-[11px] text-slate-400">Authorized LandBank personnel only.</p>

    <script>
      function safePath(raw) {
        if (!raw || typeof raw !== 'string') return '/';
        if (!raw.startsWith('/') || raw.startsWith('//')) return '/';
        return raw;
      }
      const params = new URLSearchParams(location.search);
      const redirectTo = safePath(params.get('from'));

      document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const err = document.getElementById('login-error');
        err.classList.add('hidden');
        try {
          const r = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password }),
          });
          const data = await r.json().catch(function () {
            return {};
          });
          if (r.ok) {
            window.location.href = redirectTo;
            return;
          }
          err.textContent = data.error || 'Sign in failed.';
          err.classList.remove('hidden');
        } catch {
          err.textContent = 'Network error. Try again.';
          err.classList.remove('hidden');
        }
      });
    </script>
  </body>
</html>
